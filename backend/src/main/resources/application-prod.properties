# =============================================================
# PROFIL PROD (Railway / PostgreSQL)
# Flyway gère le schéma, Hibernate ne touche pas au schéma
# =============================================================
# La datasource est configurée via les variables d'environnement Railway :
#   SPRING_DATASOURCE_URL=jdbc:postgresql://host:port/db
#   SPRING_DATASOURCE_USERNAME=...
#   SPRING_DATASOURCE_PASSWORD=...
# Spring Boot les mappe automatiquement (pas besoin de les écrire ici)

spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.h2.console.enabled=false

# Flyway applique les migrations SQL versionnées
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# Hibernate ne touche PAS au schéma (Flyway s'en charge)
spring.jpa.hibernate.ddl-auto=none

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
