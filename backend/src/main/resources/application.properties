# =============================================================
# Config universelle : env vars Railway → PostgreSQL, sinon → H2
# Plus besoin de profils ! Spring Boot résout les variables.
# =============================================================

# --- Datasource ---
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/utilitymap;AUTO_SERVER=TRUE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# --- JPA / Hibernate ---
# Railway doit définir SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
# Railway doit définir SPRING_JPA_HIBERNATE_DDL_AUTO=none
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}

spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true

# --- Flyway ---
# Railway doit définir SPRING_FLYWAY_ENABLED=true
spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:false}
spring.flyway.locations=classpath:db/migration

# --- H2 console (dev only) ---
spring.h2.console.enabled=${SPRING_H2_CONSOLE_ENABLED:true}
spring.h2.console.path=/h2-console

server.port=${PORT:8080}

# CORS - Angular dev server
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}
