# =============================================================
# Config universelle : env vars Railway → PostgreSQL, sinon → H2
# Plus besoin de profils ! Spring Boot résout les variables.
# =============================================================

# --- Datasource ---
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/utilitymap;AUTO_SERVER=TRUE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# --- JPA / Hibernate ---
# PAS de spring.jpa.database-platform : Hibernate 6 auto-détecte depuis l'URL JDBC
# PostgreSQL URL → PostgreSQLDialect, H2 URL → H2Dialect
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}

spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
# Fix Hibernate 6 + PostgreSQL : paramètres envoyés comme bytea au lieu de text
spring.jpa.properties.hibernate.dialect.native_param_markers=false

# --- Flyway ---
spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:false}
spring.flyway.locations=classpath:db/migration

# --- H2 console (dev only) ---
spring.h2.console.enabled=${SPRING_H2_CONSOLE_ENABLED:true}
spring.h2.console.path=/h2-console

server.port=${PORT:8080}

# CORS - Angular dev server
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}
