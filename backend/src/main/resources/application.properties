# =============================================================
# Profil actif : Spring Boot résout la variable d'env lui-même
# Sur Railway : SPRING_PROFILES_ACTIVE=prod → application-prod.properties
# En local : pas de variable → profil par défaut (H2)
# =============================================================
spring.profiles.active=${SPRING_PROFILES_ACTIVE:}

# --- Base de données par défaut : H2 fichier persistant (dev local) ---
spring.datasource.url=jdbc:h2:file:./data/utilitymap;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# En dev local (H2) : Hibernate gère le schéma, Flyway désactivé
spring.jpa.hibernate.ddl-auto=update
spring.flyway.enabled=false

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=${PORT:8080}

# CORS - Angular dev server
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}
