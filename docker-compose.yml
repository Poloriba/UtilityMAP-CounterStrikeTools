version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: utilitymap-db
    environment:
      POSTGRES_DB: utilitymap
      POSTGRES_USER: utilitymap
      POSTGRES_PASSWORD: utilitymap
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U utilitymap"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: utilitymap-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/utilitymap
      SPRING_DATASOURCE_USERNAME: utilitymap
      SPRING_DATASOURCE_PASSWORD: utilitymap
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_H2_CONSOLE_ENABLED: "false"
      CORS_ALLOWED_ORIGINS: http://localhost:4200
      SPRING_PROFILES_ACTIVE: default
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: utilitymap-frontend
    depends_on:
      - backend
    ports:
      - "4200:80"

volumes:
  postgres_data:
